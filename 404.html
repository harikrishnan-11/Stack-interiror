<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Not Found | Stackly Interiors</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
       :root {
    --bg: #0d0d14;
    --text: #f0ece4;
    --muted: rgba(240, 236, 228, 0.6);
    --accent: #c8a96e;
    --border: rgba(255,255,255,0.08);
    --card: rgba(255,255,255,0.04);
}

/* =========================
   BASE
========================= */
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    overflow: hidden;
    padding: 20px;
}

/* =========================
   WRAPPER
========================= */
.wrapper {
    max-width: 600px;
    width: 100%;
    padding: 40px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    backdrop-filter: blur(10px);

    /* animation */
    animation: fadeInUp 0.8s ease forwards;
    opacity: 0;
    transform: translateY(20px);
}

/* =========================
   ICON + TEXT
========================= */
.icon {
    font-size: 70px;
    color: var(--accent);
    margin-bottom: 20px;
    animation: pulse 2.5s infinite ease-in-out;
}

h1 {
    font-size: 90px;
    margin: 0;
    font-weight: 800;
    color: var(--accent);
    animation: zoomIn 0.6s ease;
}

h2 {
    margin: 10px 0;
    font-size: 24px;
}

p {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.6;
}

/* =========================
   BUTTONS
========================= */
.btns {
    margin-top: 25px;
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
}

a {
    text-decoration: none;
}

.btn {
    padding: 10px 18px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 14px;
    transition: 0.3s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
}

.primary {
    background: var(--accent);
    color: #1a1508;
}

.primary:hover {
    transform: translateY(-3px);
    opacity: 0.9;
}

.secondary {
    border: 1px solid var(--border);
    color: var(--text);
}

.secondary:hover {
    border-color: var(--accent);
    transform: translateY(-3px);
}

/* =========================
   FLOATING BACKGROUND
========================= */
.floating {
    position: absolute;
    width: 200px;
    height: 200px;
    background: rgba(200,169,110,0.08);
    border-radius: 50%;
    filter: blur(60px);
    animation: float 6s infinite alternate ease-in-out;
}

.f1 { top: 10%; left: 15%; }
.f2 { bottom: 10%; right: 15%; }

/* =========================
   ANIMATIONS
========================= */
@keyframes float {
    from { transform: translateY(0px) scale(1); }
    to { transform: translateY(40px) scale(1.1); }
}

@keyframes fadeInUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes zoomIn {
    from {
        transform: scale(0.8);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}

@keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
}

/* =========================
   TABLET (768px)
========================= */
@media (max-width: 768px) {
    h1 {
        font-size: 70px;
    }

    h2 {
        font-size: 20px;
    }

    .wrapper {
        padding: 30px;
    }

    .floating {
        width: 150px;
        height: 150px;
    }
}

/* =========================
   MOBILE (480px)
========================= */
@media (max-width: 480px) {
    h1 {
        font-size: 55px;
    }

    .icon {
        font-size: 55px;
    }

    .wrapper {
        padding: 25px;
    }

    .btn {
        width: 100%;
        justify-content: center;
    }
}

/* =========================
   SMALL MOBILE (320px FIX)
========================= */
@media (max-width: 320px) {
    h1 {
        font-size: 42px;
    }

    h2 {
        font-size: 16px;
    }

    p {
        font-size: 12px;
    }

    .wrapper {
        padding: 18px;
        border-radius: 12px;
    }

    .icon {
        font-size: 45px;
    }

    .btn {
        font-size: 12px;
        padding: 8px 12px;
    }

    .floating {
        width: 120px;
        height: 120px;
        filter: blur(40px);
    }
}
    </style>
</head>

<body>

<div class="floating f1"></div>
<div class="floating f2"></div>

<div class="wrapper">

    <div class="icon">
        <i class="fa-solid fa-compass-drafting"></i>
    </div>

    <h1>404</h1>
    <h2>Oops! Page Not Found</h2>

    <p>
        The design you’re looking for seems to have been moved or doesn’t exist.
        Let’s take you back to a beautiful space.
    </p>

    <div class="btns">
        <a href="./index.html" class="btn primary">
            <i class="fa-solid fa-house"></i> Home
        </a>

        <a href="./projects.html" class="btn secondary">
            <i class="fa-solid fa-ruler-combined"></i> Projects
        </a>
    </div>

</div>

</body>
</html>
